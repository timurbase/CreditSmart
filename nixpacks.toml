[phases.setup]
nixPkgs = ["python311"]

[phases.install]
cmds = ["pip install -r requirements.txt"]

[start]
cmd = "python manage.py migrate --noinput && python manage.py load_banks && python manage.py collectstatic --noinput && gunicorn creditsmart.wsgi --bind 0.0.0.0:$PORT --workers 2 --log-file -"
